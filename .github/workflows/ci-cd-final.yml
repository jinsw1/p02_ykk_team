name: CI/CD Docker

on:
  push:
    branches:
      - main
      - staging
      - "dev/**"
      - "feature/**"

  workflow_dispatch:
    inputs:
      environment:
        description: "dev / staging / prod"
        required: false
        default: dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # =========================
      # 1. AWS Credentials
      # =========================
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2


      # =========================
      # 2. Set Environment (dev / staging / prod)
      # =========================
      - name: Set environment
        run: |
          if [ "${{ github.event.inputs.environment }}" != "" ]; then
            ENV=${{ github.event.inputs.environment }}

          elif [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            ENV=prod

          elif [[ "${GITHUB_REF}" == "refs/heads/staging" ]]; then
            ENV=staging

          else
            ENV=dev
          fi

          echo "ENV=$ENV" >> $GITHUB_ENV
          echo "Selected ENV = $ENV"


      # =========================
      # 3. Environment mapping
      # =========================
      - name: Set config
        run: |
          if [ "$ENV" = "prod" ]; then
            echo "ROLE_TAG=was-prod" >> $GITHUB_ENV
            echo "IMAGE_TAG=prod" >> $GITHUB_ENV

          elif [ "$ENV" = "staging" ]; then
            echo "ROLE_TAG=was-staging" >> $GITHUB_ENV
            echo "IMAGE_TAG=staging" >> $GITHUB_ENV

          else
            echo "ROLE_TAG=was-dev" >> $GITHUB_ENV
            echo "IMAGE_TAG=dev" >> $GITHUB_ENV
          fi


      # =========================
      # 4. Docker Hub Login
      # =========================
      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      
      # =========================
      # SHA 태그 생성
      # =========================      
      - name: Set image tags
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)

          echo "SHA_TAG=$SHORT_SHA" >> $GITHUB_ENV

          echo "SHA_TAG=$SHORT_SHA"
          echo "IMAGE_TAG=$IMAGE_TAG"


      # =========================
      # 5. Build Docker image
      # =========================
      #- name: Build Docker image
      #  run: |
      #    docker build -t jinsw1/ykk-app:$IMAGE_TAG ./docker/was_server/fastapi_lunch_app
      - name: Build Docker image
        run: |
          docker build \
            -t jinsw1/ykk-app:$SHA_TAG \
            -t jinsw1/ykk-app:$IMAGE_TAG \
            ./docker/was_server/fastapi_lunch_app      


      # =========================
      # 6. Push Docker image
      # =========================
      #- name: Push Docker image
      #  run: |
      #    docker push jinsw1/ykk-app:$IMAGE_TAG
      - name: Push Docker image
        run: |
          docker push jinsw1/ykk-app:$SHA_TAG
          docker push jinsw1/ykk-app:$IMAGE_TAG      


      # =========================
      # 7. Find EC2 instances (SSM)
      # =========================
      - name: Find WAS instances
        id: instances
        run: |
          INSTANCE_IDS=$(aws ec2 describe-instances \
            --region ap-northeast-2 \
            --filters \
              "Name=tag:Role,Values=$ROLE_TAG" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId" \
            --output text | tr '\t' ' ')

          if [ -z "$INSTANCE_IDS" ]; then
            echo "No running instances found"
            exit 1
          fi

          echo "INSTANCE_IDS=$INSTANCE_IDS" >> $GITHUB_ENV
          echo "Found: $INSTANCE_IDS"


      # =========================
      # 8. Check SSM
      # =========================
      - name: Check SSM
        run: |
          aws ssm describe-instance-information \
            --query 'InstanceInformationList[*].[InstanceId,PingStatus]' \
            --output table


      # =========================
      # 9. Get DB Host
      # =========================
      - name: Get DB host
        run: |
          DB_HOST=$(aws ssm get-parameter \
            --name "/$ENV/app/db/host" \
            --query "Parameter.Value" \
            --output text)

          echo "DB_HOST=$DB_HOST" >> $GITHUB_ENV


      # =========================
      # 10. Deploy via SSM
      # =========================
      - name: Deploy via SSM
        run: |
          aws ssm send-command \
            --region ap-northeast-2 \
            --document-name "AWS-RunShellScript" \
            --instance-ids $INSTANCE_IDS \
            --comment "Docker Deploy ($ENV)" \
            --parameters "commands=[
              \"sudo -iu ykk-admin bash << 'EOF'\",
              \"set -e\",

              \"echo Logging into Docker Hub\",
              \"echo '${{ secrets.DOCKER_PASSWORD }}' | docker login -u '${{ secrets.DOCKER_USERNAME }}' --password-stdin\",

              \"cd /home/ykk-admin/app\",
              \"git fetch origin main\",
              \"git checkout origin/main -- docker/was_server\",

              \"cd /home/ykk-admin/app/docker/was_server\",

              \"echo DB_HOST=$DB_HOST > .env\",

              \"docker pull jinsw1/ykk-app:$IMAGE_TAG\",
              \"docker compose down || true\",
              \"docker compose up -d --build\",

              \"EOF\"
            ]"