name: CI/CD Docker

on:
  push:
    branches:
      - main
      - staging
      - "dev/**"
      - "feature/**"

  workflow_dispatch:
    inputs:
      environment:
        description: "dev / staging / prod"
        required: false
        default: dev

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      nginx: ${{ steps.filter.outputs.nginx }}

    steps:
      - uses: actions/checkout@v4

      - name: Detect changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          # 커밋기준
          base: ${{ github.event.before }}
          ref: ${{ github.sha }}        
          ## PR 기준
          #base: ${{ github.event.pull_request.base.sha }}
          #ref: ${{ github.event.pull_request.head.sha }}     
          filters: |
            app:
              - 'docker/was_server/fastapi_lunch_app/**'
            nginx:
              - 'docker/was_server/nginx/**'

  deploy:
    needs: detect
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # =========================
      # 1. AWS Credentials
      # =========================
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2


      # =========================
      # 2. Set Environment ENV 결정 (dev / staging / prod)
      # =========================
      - name: Set environment
        run: |
          if [ "${{ github.event.inputs.environment }}" != "" ]; then
            ENV=${{ github.event.inputs.environment }}

          elif [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            ENV=prod

          elif [[ "${GITHUB_REF}" == "refs/heads/staging" ]]; then
            ENV=staging

          else
            ENV=dev
          fi

          echo "ENV=$ENV" >> $GITHUB_ENV
          echo "Selected ENV = $ENV"


      # =========================
      # 3. Environment mapping (ROLE / IMAGE TAG)
      # =========================
      - name: Set config
        run: |
          if [ "$ENV" = "prod" ]; then
            echo "ROLE_TAG=was-prod" >> $GITHUB_ENV
            echo "IMAGE_TAG=prod" >> $GITHUB_ENV

          elif [ "$ENV" = "staging" ]; then
            echo "ROLE_TAG=was-staging" >> $GITHUB_ENV
            echo "IMAGE_TAG=staging" >> $GITHUB_ENV

          else
            echo "ROLE_TAG=was-dev" >> $GITHUB_ENV
            echo "IMAGE_TAG=dev" >> $GITHUB_ENV
          fi

      # =========================
      # 4. Docker Hub Login
      # =========================
      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      
      # =========================
      # 5. SHA 태그 생성
      # =========================      
      - name: Set image tags
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)

          echo "SHA_TAG=$SHORT_SHA" >> $GITHUB_ENV

          echo "SHA_TAG=$SHORT_SHA"
          echo "IMAGE_TAG=$IMAGE_TAG"


      # =========================
      # 6. Build Docker image
      # =========================
      #- name: Build Docker image
      #  run: |
      #    docker build -t jinsw1/ykk-app:$IMAGE_TAG ./docker/was_server/fastapi_lunch_app
      - name: Build Docker image
        if: needs.detect.outputs.app == 'true'
        run: |
          docker build \
            -t jinsw1/ykk-app:$SHA_TAG \
            -t jinsw1/ykk-app:$IMAGE_TAG \
            ./docker/was_server/fastapi_lunch_app      


      # =========================
      # 7. Push Docker image
      # =========================
      #- name: Push Docker image
      #  run: |
      #    docker push jinsw1/ykk-app:$IMAGE_TAG
      - name: Push Docker image
        if: needs.detect.outputs.app == 'true'
        run: |
          docker push jinsw1/ykk-app:$SHA_TAG
          docker push jinsw1/ykk-app:$IMAGE_TAG      


      # =========================
      # 8. Find EC2 instances (SSM)- EC2 조회
      # =========================
      - name: Find WAS instances
        id: instances
        run: |
          INSTANCE_IDS=$(aws ec2 describe-instances \
            --region ap-northeast-2 \
            --filters \
              "Name=tag:Role,Values=$ROLE_TAG" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId" \
            --output text | tr '\t' ' ')

          if [ -z "$INSTANCE_IDS" ]; then
            echo "No running instances found"
            exit 1
          fi

          echo "INSTANCE_IDS=$INSTANCE_IDS" >> $GITHUB_ENV
          echo "Found: $INSTANCE_IDS"


      # =========================
      # 9. Check SSM (SSM 상태 체크)
      # =========================
      - name: Check SSM
        run: |
          aws ssm describe-instance-information \
            --query 'InstanceInformationList[*].[InstanceId,PingStatus]' \
            --output table


      # =========================
      # 10. Get DB Host
      # =========================
      - name: Get DB host
        run: |
          DB_HOST=$(aws ssm get-parameter \
            --name "/$ENV/app/db/host" \
            --query "Parameter.Value" \
            --output text)

          echo "DB_HOST=$DB_HOST" >> $GITHUB_ENV


      # =========================
      # 11. Deploy via SSM
      # =========================
      - name: Deploy via SSM
        if: needs.detect.outputs.app == 'true' || needs.detect.outputs.nginx == 'true'
        run: |
          aws ssm send-command \
            --region ap-northeast-2 \
            --document-name "AWS-RunShellScript" \
            --instance-ids $INSTANCE_IDS \
            --comment "Docker Deploy ($ENV)" \
            --parameters "commands=[
              \"sudo -iu ykk-admin bash << 'EOF'\",
              \"set -e\",

              \"echo Logging into Docker Hub\",
              \"echo '${{ secrets.DOCKER_PASSWORD }}' | docker login -u '${{ secrets.DOCKER_USERNAME }}' --password-stdin\",

              \"cd /home/ykk-admin/app\",
              \"git fetch origin main\",
              \"git checkout origin/main -- docker/was_server\",

              \"cd /home/ykk-admin/app/docker/was_server\",

              \"APP_CHANGED=${{ needs.detect.outputs.app }}\",
              \"NGINX_CHANGED=${{ needs.detect.outputs.nginx }}\",

              \"echo APP=$APP_CHANGED\",              

              \"if [ \\\"${{ needs.detect.outputs.app }}\\\" = \\\"true\\\" ] && [ \\\"${{ needs.detect.outputs.nginx }}\\\" = \\\"true\\\" ]; then\",
              \"  echo 'FULL REDEPLOY'\",
              \"  docker pull jinsw1/ykk-app:$IMAGE_TAG\",
              \"  docker compose up -d --build\",

              \"elif [ \\\"${{ needs.detect.outputs.app }}\\\" = \\\"true\\\" ]; then\",
              \"  echo 'APP ONLY'\",
              \"  docker pull jinsw1/ykk-app:$IMAGE_TAG\",
              \"  docker compose up -d ykk-app\",

              \"elif [ \\\"${{ needs.detect.outputs.nginx }}\\\" = \\\"true\\\" ]; then\",
              \"  echo 'NGINX ONLY'\",
              \"  docker compose up -d nginx\",

              \"else\",
              \"  echo 'NO CHANGES'\",
              \"fi\",

              \"EOF\"
            ]"