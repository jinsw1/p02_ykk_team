#~/project/docker/compose/tunnel/prod.yml
services:
  # cloudflared:
  #   image: cloudflare/cloudflared:latest
  #   container_name: ykk-tunnel
  #   restart: unless-stopped
  #   command: tunnel run
  #   environment:
  #     - TUNNEL_TOKEN=${CLOUDFLARE_TOKEN}

  prometheus:
    image: prom/prometheus:latest
    container_name: ykk-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:latest
    container_name: ykk-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - prometheus