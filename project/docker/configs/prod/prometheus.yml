#~/project/docker/configs/prod/prometheus.yml
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'was-node-exporter'
    static_configs:
      # 앞서 구축한 WAS 서버의 프라이빗 아이피를 입력합니다.
      - targets: ['172.31.37.171:9100']

  - job_name: 'db-node-exporter'
    static_configs:
      # 앞서 구축한 DB 서버의 프라이빗 아이피를 입력합니다.
      - targets: ['172.31.39.1:9100']