#~/ansible/playbooks/site.yml
---
# =================================================================
# [1단계] 모든 서버 공통 환경 및 보안 구성 (KISA 가이드 반영)
# =================================================================
- hosts: all
  become: yes
  roles:
    - role: common
      tags: [common, security]

# =================================================================
# [2단계] 모든 서버 컨테이너 구동 환경 (Docker) 구축
# =================================================================
- hosts: all
  become: yes
  roles:
    - role: docker
      tags: [docker, base]

# =================================================================
# [3단계] 3-Tier 아키텍처 애플리케이션 배포 (Docker 기반)
# =================================================================
- hosts: db_servers
  become: yes
  roles:
    - role: db
      tags: [db]

- hosts: was_servers
  become: yes
  roles:
    - role: was
      tags: [was]

- hosts: tunnel_servers
  become: yes
  roles:
    - role: tunnel
      tags: [tunnel]