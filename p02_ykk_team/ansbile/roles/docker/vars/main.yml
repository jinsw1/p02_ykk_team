#~/ansible/roles/docker/vars/main.yml
---
# 아키텍처 동적 매핑 테이블
docker_arch_map:
  x86_64: amd64
  aarch64: arm64
  armv7l: armhf

# Docker 버전을 고정할 때 사용하는 변수입니다.
# 비워두면 최신 버전을 설치하며, 값을 입력하면 해당 버전으로 고정됩니다.
# 주의: 버전을 입력하기 전, 대상 서버에서 apt-cache madison docker-ce 명령을 통해 
# 실제 설치 가능한 정확한 버전 문자열을 확인 후 적용하시기 바랍니다.
docker_version: ""