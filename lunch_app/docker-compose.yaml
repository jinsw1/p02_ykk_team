services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: scott
      POSTGRES_PASSWORD: tiger
      POSTGRES_DB: lunch_db
    ports:
      - "5432:5432"
    volumes:
      # 컨테이너 외부(EC2)의 현재 폴더 하위에 pg_data라는 폴더를 만들어 데이터를 영구 보존합니다.
      - ./pg_data:/var/lib/postgresql/data
      
      # DB 컨테이너가 처음 생성될 때 이 init.sql을 읽어서 자동으로 테이블과 데이터를 세팅합니다.
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  web:
    # Dockerfile을 읽어서 이미지를 직접 빌드합니다.
    build: .
    ports:
      - "8000:8000"
    environment:
      # FastAPI가 같은 도커 네트워크 안에 있는 'db' 컨테이너를 찾을 수 있도록 환경변수를 덮어씌웁니다.
      DB_HOST: db
      DB_USER: scott
      DB_PASSWORD: tiger
      DB_NAME: lunch_db
      DB_PORT: 5432
    depends_on:
      - db