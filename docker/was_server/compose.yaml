services:
  nginx:
    image: nginx:latest
    container_name: was-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      #- ./nginx/dev/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/${ENV}/conf.d:/etc/nginx/conf.d:ro
      # 로그 저장
      - ./logs:/var/log/nginx

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"      
    # depends_on:
    #   - fastapi
    networks:
      - app-network

  ykk-app:
    #image: ykk/lunch-app:latest
    image: jinsw1/ykk-app-test:1.0
    ports:
      - "8000:8000"
    environment:
      # FastAPI가 같은 도커 네트워크 안에 있는 'db' 컨테이너를 찾을 수 있도록 환경변수를 덮어씌웁니다.
      #DB_HOST: db
      DB_HOST: ${DB_HOST}
      DB_USER: scott
      DB_PASSWORD: tiger
      DB_NAME: lunch_db
      DB_PORT: 5432      
    networks:
      - app-network      

  # fastapi:
  #   image: your-dockerhub-user/myapp:latest
  #   container_name: fastapi
  #   expose:
  #     - "8000"      

  # fastapi:
  #   image: ghcr.io/your-org/fastapi:latest
  #   container_name: was-fastapi
  #   restart: always
  #   expose:
  #     - "8000"
  #   env_file:
  #     - ./env/.env.dev   # 기본값 (override에서 변경)
  #   networks:
  #     - app-network

  # --- [모니터링 추가] ---
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    network_mode: host
    pid: host
    restart: always

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: cadvisor
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    restart: always

networks:
  app-network:
    driver: bridge