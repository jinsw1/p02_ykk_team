<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>예약 시스템 최고관리자</title>
  <style>
    @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css");
    
    body { font-family: "Pretendard", sans-serif; background: #F8FAFC; margin: 0; color: #1E293B; -webkit-font-smoothing: antialiased; }
    
    header { 
      background: #0F172A; color: white; padding: 18px 40px; display: flex; justify-content: space-between; align-items: center;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
    }
    header h1 { margin: 0; font-size: 20px; font-weight: 800; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
    header h1::before { content: "🍚"; font-size: 22px; }
    .btn-logout { background: #EF4444; color: white; border: none; padding: 10px 18px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .btn-logout:hover { background: #DC2626; box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2); }
    
    .nav-tabs { display: flex; background: white; border-bottom: 1px solid #E2E8F0; padding: 0 40px; gap: 4px; }
    .nav-tabs button { background: none; border: none; padding: 20px 24px; font-size: 15px; font-weight: 600; color: #64748B; cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s; }
    .nav-tabs button:hover { color: #334155; }
    .nav-tabs button.active { color: #F97316; border-bottom: 3px solid #F97316; font-weight: 800; }
    
    main { padding: 40px; max-width: 1140px; margin: 0 auto; }
    .tab-content { display: none; background: white; padding: 36px; border-radius: 20px; box-shadow: 0 4px 20px rgba(15, 23, 42, 0.02); border: 1px solid #E2E8F0; }
    .tab-content.active { display: block; animation: fadeIn 0.3s ease-in-out; }
    
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    
    h2 { margin-top: 0; border-bottom: 2px solid #F1F5F9; padding-bottom: 16px; margin-bottom: 28px; font-size: 22px; font-weight: 800; color: #1E293B; letter-spacing: -0.5px; }
    
    .stat-cards { display: flex; gap: 24px; margin-bottom: 40px; }
    .stat-card { flex: 1; background: #FFFFFF; border: 1px solid #E2E8F0; padding: 24px; border-radius: 16px; position: relative; overflow: hidden; box-shadow: 0 2px 8px rgba(15,23,42,0.01); }
    .stat-card::before { content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: #CBD5E1; }
    .stat-card.c-total::before { background: #3B82F6; }
    .stat-card.c-res::before { background: #10B981; }
    .stat-card.c-rem::before { background: #F97316; }
    .stat-card h3 { margin: 0 0 8px 0; color: #64748B; font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-card p { margin: 0; font-size: 32px; font-weight: 800; color: #1E293B; line-height: 1; }
    
    table { width: 100%; border-collapse: collapse; margin-bottom: 32px; }
    th, td { padding: 14px 16px; text-align: left; font-size: 14px; border-bottom: 1px solid #F1F5F9; }
    th { background: #F8FAFC; font-weight: 700; color: #475569; border-top: 1px solid #E2E8F0; }
    tr:hover td { background-color: #F8FAFC; }
    
    .input-box { width: 90px; padding: 8px 12px; border: 1.5px solid #E2E8F0; border-radius: 8px; font-size: 14px; color: #1E293B; outline: none; transition: all 0.2s; }
    .input-box:focus { border-color: #475569; box-shadow: 0 0 0 3px rgba(71,85,105,0.08); }
    
    .btn-action { padding: 8px 14px; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 700; transition: all 0.2s; display: inline-flex; align-items: center; gap: 4px; }
    .btn-save { background: #10B981; color: white; }
    .btn-save:hover { background: #059669; }
    .btn-delete { background: #EF4444; color: white; }
    .btn-delete:hover { background: #DC2626; }
    .btn-img-setup { background: #F1F5F9; color: #475569; border: 1px solid #E2E8F0; }
    .btn-img-setup:hover { background: #E2E8F0; color: #1E293B; }
    .btn-add { background: #1E293B; color: white; padding: 14px 24px; font-size: 14px; border-radius: 10px; margin-top: 8px; width: auto; box-shadow: 0 4px 12px rgba(15,23,42,0.1); }
    .btn-add:hover { background: #0F172A; }
    
    .form-box { background: #F8FAFC; border: 1px solid #E2E8F0; padding: 28px; border-radius: 16px; margin-top: 12px; }
    .form-row { display: flex; gap: 16px; margin-bottom: 16px; }
    .form-row input { flex: 1; padding: 12px 16px; border: 1.5px solid #E2E8F0; border-radius: 10px; font-size: 14px; outline: none; background: white; transition: all 0.2s; }
    .form-row input:focus { border-color: #F97316; box-shadow: 0 0 0 3px rgba(249,115,22,0.08); }
    
    /* Bug 1 수정: check-label CSS를 head로 이동 */
    .check-label { display: flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 700; color: #475569; background: #F1F5F9; padding: 6px 12px; border-radius: 8px; user-select: none; border: 1px solid #E2E8F0; cursor: pointer; }
    .check-label input { width: 16px; height: 16px; accent-color: #F97316; cursor: pointer; }

    /* ───────────────────────────────────────────
       토스트 알림 스타일
    ─────────────────────────────────────────── */
    #admin-toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 22px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 600;
      color: white;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.15);
      z-index: 9999;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.3s cubic-bezier(0.4,0,0.2,1), transform 0.3s cubic-bezier(0.4,0,0.2,1);
      pointer-events: none;
      white-space: nowrap;
    }
    #admin-toast.show { opacity: 1; transform: translateY(0); }
    #admin-toast.success { background: #065F46; }
    #admin-toast.error   { background: #991B1B; }
    #admin-toast.info    { background: #1E40AF; }
    #admin-toast.warn    { background: #92400E; }

    /* ───────────────────────────────────────────
       커스텀 Confirm 모달 스타일
    ─────────────────────────────────────────── */
    #confirm-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(4px);
      z-index: 9998;
      justify-content: center;
      align-items: center;
    }
    #confirm-overlay.show { display: flex; }
    #confirm-box {
      background: white;
      border-radius: 20px;
      padding: 36px 32px 28px;
      width: 360px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.15);
      border: 1px solid #E2E8F0;
      animation: fadeIn 0.2s ease;
    }
    #confirm-icon  { font-size: 36px; text-align: center; margin-bottom: 12px; }
    #confirm-msg   { font-size: 15px; font-weight: 600; color: #1E293B; text-align: center; margin-bottom: 28px; line-height: 1.6; }
    .confirm-btns  { display: flex; gap: 10px; }
    .confirm-btns button { flex: 1; padding: 13px; border: none; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: "Pretendard", sans-serif; }
    #confirm-ok    { background: #EF4444; color: white; }
    #confirm-ok.safe { background: #10B981; }
    #confirm-ok:hover { opacity: 0.9; }
    #confirm-cancel { background: #F1F5F9; color: #475569; }
    #confirm-cancel:hover { background: #E2E8F0; }
  </style>
</head>
<body>

<header>
  <h1>사내 점심 시스템 최고관리자</h1>
  <button class="btn-logout" onclick="logout()">로그아웃</button>
</header>

<div class="nav-tabs">
  <button id="tab-btn-dash"   class="active" onclick="switchTab('dash')">당일 예약 종합 현황판</button>
  <button id="tab-btn-menu"   onclick="switchTab('menu')">메뉴 등록 및 수량 수정</button>
  <button id="tab-btn-member" onclick="switchTab('member')">사원 사번 및 비밀번호 관리</button>
</div>

<main>
  <section id="sec-dash" class="tab-content active">
    <h2>실시간 예약 대시보드</h2>
    <div class="stat-cards">
      <div class="stat-card c-total"><h3>총 준비 수량</h3><p id="dash-total">0</p></div>
      <div class="stat-card c-res"><h3>예약 완료 건수</h3><p id="dash-reserved">0</p></div>
      <div class="stat-card c-rem"><h3>예약 가능 잔여량</h3><p id="dash-remaining">0</p></div>
    </div>
    <table>
      <thead><tr><th>메뉴 정보</th><th>총 제공량</th><th>현재 잔여량</th></tr></thead>
      <tbody id="dash-table-body"></tbody>
    </table>
  </section>

  <section id="sec-menu" class="tab-content">
    <h2>운영 메뉴 현황 및 제어</h2>
    <table>
      <thead><tr><th>ID</th><th>메뉴 이름</th><th>속성 지정</th><th>총 수량</th><th>잔여 수량</th><th>데이터 관리</th></tr></thead>
      <tbody id="menu-table-body"></tbody>
    </table>

    <h2 style="margin-top: 48px;">신규 운영 메뉴 등록</h2>
    <div class="form-box">
      <div class="form-row">
        <input type="text"   id="new-menu-emoji" placeholder="대표 아이콘 이모지 (예: 🥩)">
        <input type="text"   id="new-menu-name"  placeholder="메뉴 명칭">
        <input type="text"   id="new-menu-desc"  placeholder="메뉴 구성 및 상세 설명">
      </div>
      <div class="form-row">
        <input type="number" id="new-menu-kcal"  placeholder="칼로리 정보 (kcal)">
        <input type="number" id="new-menu-total" placeholder="당일 준비 총 수량 (개)">
      </div>
      <button class="btn-action btn-add" onclick="addMenu()">새 메뉴 인프라 등록</button>
    </div>
  </section>

  <section id="sec-member" class="tab-content">
    <h2>데이터베이스 사원 명단 관리</h2>
    <table>
      <thead><tr><th>사원 번호</th><th>이름</th><th>비밀번호</th><th>소속 부서</th><th>계정 제어</th></tr></thead>
      <tbody id="member-table-body"></tbody>
    </table>

    <h2 style="margin-top: 48px;">인프라 사원 신규 추가</h2>
    <div class="form-box">
      <div class="form-row">
        <input type="text" id="new-emp-id"   placeholder="신규 고유 사번 (예: EMP006)">
        <input type="text" id="new-emp-name" placeholder="사원 성명">
        <input type="text" id="new-emp-pw"   placeholder="접속 초기 비밀번호 지정">
        <input type="text" id="new-emp-dept" placeholder="소속 부서명">
      </div>
      <button class="btn-action btn-add" onclick="addMember()">새 사원 계정 생성</button>
    </div>
  </section>
</main>

<!-- 토스트 알림 엘리먼트 -->
<div id="admin-toast"></div>

<!-- 커스텀 Confirm 모달 -->
<div id="confirm-overlay">
  <div id="confirm-box">
    <div id="confirm-icon">⚠️</div>
    <div id="confirm-msg"></div>
    <div class="confirm-btns">
      <button id="confirm-cancel" onclick="closeConfirm(false)">취소</button>
      <button id="confirm-ok"     onclick="closeConfirm(true)">확인</button>
    </div>
  </div>
</div>

<script>
  /* ─────────────────────────────────────────
     토스트 알림
     showToast(msg, type)
       type: 'success' | 'error' | 'info' | 'warn'
  ───────────────────────────────────────── */
  let toastTimer = null;
  function showToast(msg, type = 'info') {
    const icons = { success: '✅', error: '❌', info: 'ℹ️', warn: '⚠️' };
    const t = document.getElementById('admin-toast');
    t.textContent = icons[type] + '  ' + msg;
    t.className = `show ${type}`;
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.className = ''; }, 3000);
  }

  /* ─────────────────────────────────────────
     커스텀 Confirm 모달
     showConfirm(msg, okLabel, dangerous)
       → Promise<boolean>
  ───────────────────────────────────────── */
  let confirmResolve = null;
  function showConfirm(msg, okLabel = '확인', dangerous = true) {
    document.getElementById('confirm-msg').textContent = msg;
    document.getElementById('confirm-ok').textContent = okLabel;
    document.getElementById('confirm-ok').className = dangerous ? '' : 'safe';
    document.getElementById('confirm-overlay').classList.add('show');
    return new Promise(resolve => { confirmResolve = resolve; });
  }
  function closeConfirm(result) {
    document.getElementById('confirm-overlay').classList.remove('show');
    if (confirmResolve) { confirmResolve(result); confirmResolve = null; }
  }
  // 오버레이 바깥 클릭 시 취소
  document.getElementById('confirm-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeConfirm(false);
  });

  /* ─────────────────────────────────────────
     탭 전환
  ───────────────────────────────────────── */
  function switchTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.nav-tabs button').forEach(el => el.classList.remove('active'));
    document.getElementById(`sec-${tabId}`).classList.add('active');
    document.getElementById(`tab-btn-${tabId}`).classList.add('active');
    if (tabId === 'dash')   loadDashboard();
    if (tabId === 'menu')   loadMenuData();
    if (tabId === 'member') loadMemberData();
  }

  /* ─────────────────────────────────────────
     대시보드
  ───────────────────────────────────────── */
  async function loadDashboard() {
    const res  = await fetch('/api/admin/dashboard');
    const data = await res.json();
    if (data.success) {
      document.getElementById('dash-total').textContent    = data.total_capacity;
      document.getElementById('dash-reserved').textContent = data.total_reserved;
      document.getElementById('dash-remaining').textContent = data.total_remaining;
      document.getElementById('dash-table-body').innerHTML = data.menus.map(m =>
        `<tr>
          <td style="font-weight:700;">${m.emoji} ${m.name}</td>
          <td>${m.total}개</td>
          <td style="font-weight:700; color:#F97316;">${m.remaining}개</td>
        </tr>`
      ).join('');
    }
  }

  /* ─────────────────────────────────────────
     메뉴 관리
  ───────────────────────────────────────── */
  async function loadMenuData() {
    const res  = await fetch('/api/admin/dashboard');
    const data = await res.json();
    if (data.success) {
      document.getElementById('menu-table-body').innerHTML = data.menus.map(m => `
        <tr>
          <td>#${m.id}</td>
          <td style="font-weight:700;">${m.name}</td>
          <td><label class="check-label"><input type="checkbox" id="menu-pop-${m.id}" ${m.is_popular ? 'checked' : ''}> 인기 지정</label></td>
          <td><input type="number" id="menu-tot-${m.id}" class="input-box" value="${m.total}"></td>
          <td><input type="number" id="menu-rem-${m.id}" class="input-box" value="${m.remaining}"></td>
          <td>
            <input type="file" id="upload-${m.id}" style="display:none" onchange="uploadImage(${m.id})">
            <button class="btn-action btn-img-setup" onclick="document.getElementById('upload-${m.id}').click()">🖼️ 등록</button>
            <button class="btn-action" style="background:#64748B;color:white;" onclick="deleteImage(${m.id})">🗑️ 이미지 제거</button>
            <button class="btn-action btn-save"   onclick="updateMenu(${m.id})">💾 저장</button>
            <button class="btn-action btn-delete" onclick="deleteMenu(${m.id})">❌ 삭제</button>
          </td>
        </tr>
      `).join('');
    }
  }

  async function uploadImage(id) {
    const fileInput = document.getElementById(`upload-${id}`);
    if (!fileInput.files.length) return;
    const formData = new FormData();
    formData.append("file", fileInput.files[0]);
    const res  = await fetch(`/api/admin/menus/${id}/image`, { method: 'POST', body: formData });
    const data = await res.json();
    if (data.success) {
      showToast('이미지가 저장되었습니다.', 'success');
      loadMenuData();
    } else {
      showToast('이미지 저장에 실패했습니다.', 'error');
    }
  }

  async function deleteImage(id) {
    const ok = await showConfirm('해당 메뉴의 이미지를 제거하시겠습니까?', '제거');
    if (!ok) return;
    const res  = await fetch(`/api/admin/menus/${id}/image`, { method: 'DELETE' });
    const data = await res.json();
    if (data.success) {
      showToast('이미지가 제거되었습니다.', 'success');
      loadMenuData();
    }
  }

async function updateMenu(id) {
    const total = parseInt(document.getElementById(`menu-tot-${id}`).value);
    const rem   = parseInt(document.getElementById(`menu-rem-${id}`).value);
    const pop   = document.getElementById(`menu-pop-${id}`).checked;
    
    await fetch(`/api/admin/menus/${id}/update`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ total, remaining: rem, is_popular: pop })
    });
    
    showToast('저장되었습니다.', 'success');
    loadMenuData();
  }

  async function deleteMenu(id) {
    const ok = await showConfirm('해당 메뉴를 삭제하시겠습니까?', '삭제');
    if (!ok) return;
    await fetch(`/api/admin/menus/${id}`, { method: 'DELETE' });
    showToast('메뉴가 삭제되었습니다.', 'success');
    loadMenuData();
  }

  async function addMenu() {
    const emoji = document.getElementById('new-menu-emoji').value;
    const name  = document.getElementById('new-menu-name').value;
    const desc  = document.getElementById('new-menu-desc').value;
    const kcal  = document.getElementById('new-menu-kcal').value;
    const total = document.getElementById('new-menu-total').value;
    if (!name || !total) {
      showToast('메뉴 이름과 수량은 필수입니다.', 'warn');
      return;
    }
    await fetch('/api/admin/menus', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ emoji, name, description: desc, kcal: parseInt(kcal), total: parseInt(total) })
    });
    showToast('메뉴가 등록되었습니다.', 'success');
    document.querySelectorAll('#sec-menu input[type="text"], #sec-menu input[type="number"]').forEach(el => el.value = '');
    loadMenuData();
  }

  /* ─────────────────────────────────────────
     사원 관리
  ───────────────────────────────────────── */
  async function loadMemberData() {
    const res  = await fetch('/api/admin/members');
    const data = await res.json();
    if (data.success) {
      document.getElementById('member-table-body').innerHTML = data.members.map(m => `
        <tr>
          <td style="font-weight:700;">${m.employee_id}</td>
          <td><input type="text" id="mem-name-${m.employee_id}" class="input-box" value="${m.name}"       style="width:110px"></td>
          <td><input type="text" id="mem-pw-${m.employee_id}"   class="input-box" value="${m.password}"   style="width:110px"></td>
          <td><input type="text" id="mem-dept-${m.employee_id}" class="input-box" value="${m.department}" style="width:120px"></td>
          <td>
            <button class="btn-action btn-save"   onclick="updateMember('${m.employee_id}')">저장</button>
            <button class="btn-action btn-delete" onclick="deleteMember('${m.employee_id}')">삭제</button>
          </td>
        </tr>
      `).join('');
    }
  }

  async function addMember() {
    const id   = document.getElementById('new-emp-id').value;
    const name = document.getElementById('new-emp-name').value;
    const pw   = document.getElementById('new-emp-pw').value;
    const dept = document.getElementById('new-emp-dept').value;
    if (!id || !name || !pw) {
      showToast('사번, 이름, 비밀번호는 필수입니다.', 'warn');
      return;
    }
    const res  = await fetch('/api/admin/members', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ employee_id: id, name, password: pw, department: dept })
    });
    const data = await res.json();
    if (data.success) {
      showToast('사원이 등록되었습니다.', 'success');
      document.querySelectorAll('#sec-member input').forEach(el => el.value = '');
      loadMemberData();
    } else {
      showToast(data.message, 'error');
    }
  }

  async function updateMember(id) {
    const ok = await showConfirm('변경 내역을 저장하시겠습니까?', '저장', false);
    if (!ok) return;
    const name = document.getElementById(`mem-name-${id}`).value;
    const pw   = document.getElementById(`mem-pw-${id}`).value;
    const dept = document.getElementById(`mem-dept-${id}`).value;
    await fetch(`/api/admin/members/${id}/update`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, password: pw, department: dept })
    });
    showToast('저장되었습니다.', 'success');
    loadMemberData();
  }

  async function deleteMember(id) {
    const ok = await showConfirm('해당 사원을 삭제하시겠습니까?\n연결된 예약 정보도 함께 삭제됩니다.', '삭제');
    if (!ok) return;
    await fetch(`/api/admin/members/${id}`, { method: 'DELETE' });
    showToast('사원이 삭제되었습니다.', 'success');
    loadMemberData();
  }

  async function logout() {
    await fetch('/api/admin/logout', { method: 'POST' });
    window.location.href = '/';
  }

  window.onload = loadDashboard;
</script>
</body>
</html>
