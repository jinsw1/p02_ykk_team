<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사내 점심 예약 시스템 - 로그인</title>
    <style>
        @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css");
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Pretendard", -apple-system, sans-serif; }

        body {
            background-color: #F8FAFC;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            position: relative;
        }

        header {
            background: linear-gradient(135deg, #F97316 0%, #EA580C 100%);
            padding: 20px 36px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 4px 12px rgba(234, 88, 12, 0.15);
        }

        header .logo { font-size: 28px; }
        header .title-wrap h1 { color: white; font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
        header .title-wrap p { color: rgba(255, 255, 255, 0.85); font-size: 13px; margin-top: 2px; }

        .notice-bar {
            background-color: #FFF7ED;
            border-bottom: 1px solid #FFEDD5;
            padding: 12px 36px;
            font-size: 14px;
            font-weight: 500;
            color: #C2410C;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 16px;
        }

        .login-card {
            background: white;
            border-radius: 20px;
            padding: 44px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.04);
            border: 1px solid #E2E8F0;
            transform: translateY(0);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .login-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
        }

        .login-card .card-header { text-align: center; margin-bottom: 32px; }
        .login-card .card-header .icon { font-size: 40px; margin-bottom: 12px; }
        .login-card .card-header h2 { font-size: 24px; color: #1E293B; font-weight: 800; letter-spacing: -0.5px; }
        .login-card .card-header p { font-size: 14px; color: #64748B; margin-top: 6px; }

        .error-box {
            background-color: #FEF2F2;
            border: 1px solid #FEE2E2;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 500;
            color: #EF4444;
            text-align: center;
            margin-bottom: 24px;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; font-weight: 600; color: #475569; margin-bottom: 8px; }
        
        .form-group input { 
            width: 100%; 
            padding: 14px 16px; 
            border: 1.5px solid #CBD5E1; 
            border-radius: 12px; 
            font-size: 15px; 
            color: #1E293B; 
            outline: none;
            background-color: #F8FAFC;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-group input:focus { 
            border-color: #F97316; 
            background-color: #FFFFFF;
            box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.1); 
        }

        .btn-login {
            width: 100%; 
            padding: 15px; 
            background: linear-gradient(135deg, #F97316 0%, #EA580C 100%);
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: 700; 
            cursor: pointer;
            margin-top: 12px; 
            box-shadow: 0 4px 14px rgba(234, 88, 12, 0.3);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-login:hover {
            opacity: 0.95;
            box-shadow: 0 6px 20px rgba(234, 88, 12, 0.4);
        }

        .admin-access-btn {
            position: absolute; 
            bottom: 24px; 
            right: 32px; 
            font-size: 13px; 
            font-weight: 500;
            color: #94A3B8; 
            cursor: pointer;
            padding: 8px 14px;
            border-radius: 8px;
            background-color: #FFFFFF;
            border: 1px solid #E2E8F0;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .admin-access-btn:hover {
            color: #475569;
            border-color: #CBD5E1;
            background-color: #F1F5F9;
        }

        .admin-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.3);
            backdrop-filter: blur(4px); justify-content: center; align-items: center; z-index: 1000;
        }
        
        .admin-modal-content {
            background: white; padding: 36px; border-radius: 20px; width: 340px; text-align: center;
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.15);
            border: 1px solid #E2E8F0;
        }
        
        .admin-modal-content h3 { font-size: 18px; font-weight: 800; margin-bottom: 20px; color: #1E293B; }
        
        .admin-modal-content input {
            width: 100%; padding: 12px 14px; margin-bottom: 12px; border: 1.5px solid #E2E8F0; border-radius: 10px;
            font-size: 14px; outline: none; background-color: #F8FAFC; transition: all 0.2s;
        }

        .admin-modal-content input:focus {
            border-color: #475569;
            background-color: white;
        }
        
        .admin-modal-content button {
            width: 100%; padding: 12px; border: none; border-radius: 10px; cursor: pointer; margin-bottom: 8px; font-size: 14px; font-weight: 700; transition: all 0.2s;
        }
        .btn-admin-submit { background: #1E293B; color: white; }
        .btn-admin-submit:hover { background: #0F172A; }
        .btn-admin-close { background: #F1F5F9; color: #475569; }
        .btn-admin-close:hover { background: #E2E8F0; }
    </style>
</head>
<body>

<header>
    <div class="logo">🍱</div>
    <div class="title-wrap">
        <h1>사내 점심 예약 시스템@@!!!!!!!!!</h1>
        <p>맛있는 점심, 행복한 하루! 😊</p>
    </div>
</header>

<div class="notice-bar">
    📌 12:00 ~ 13:00 신청 집중 시간으로 접속이 지연될 수 있습니다.
</div>

<main>
    <div class="login-card">
        <div class="card-header">
            <div class="icon">🔐</div>
            <h2>사원 로그인</h2>
            <p>사원번호와 비밀번호로 로그인하세요</p>
        </div>

        <div class="error-box" id="error-box" style="display: none;">
            ⚠️ 사원번호 또는 비밀번호가 일치하지 않습니다.
        </div>

        <form method="POST" action="/login">
            <div class="form-group">
                <label for="emp_no">사원 번호</label>
                <input type="text" id="emp_no" name="emp_no" placeholder="예: EMP001" required>
            </div>
            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required>
            </div>
            <button type="submit" class="btn-login">로그인</button>
        </form>
    </div>
</main>

<div class="admin-access-btn" onclick="document.getElementById('adminModal').style.display='flex'">관리자용</div>

<div class="admin-modal" id="adminModal">
    <div class="admin-modal-content">
        <h3>관리자 접속</h3>
        <input type="text" id="admin_id" placeholder="관리자 아이디">
        <input type="password" id="admin_pw" placeholder="관리자 비밀번호">
        <button class="btn-admin-submit" onclick="submitAdmin()">접속하기</button>
        <button class="btn-admin-close" onclick="document.getElementById('adminModal').style.display='none'">닫기</button>
    </div>
</div>

<script>
    if (window.location.search.includes('error=invalid')) {
        document.getElementById('error-box').style.display = 'block';
    }

    async function submitAdmin() {
        const id = document.getElementById('admin_id').value;
        const pw = document.getElementById('admin_pw').value;
        
        const res = await fetch('/api/admin/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({admin_id: id, admin_pw: pw})
        });
        const data = await res.json();
        if (data.success) {
            window.location.href = '/admin';
        } else {
            alert(data.message);
        }
    }
</script>

</body>
</html>
