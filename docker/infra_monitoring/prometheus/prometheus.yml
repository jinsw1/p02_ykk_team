global:
  scrape_interval: 15s

scrape_configs:

  ##################################################
  # Node Exporter
  ##################################################
  - job_name: "node"

    ec2_sd_configs:
      - region: ap-northeast-2
        port: 9100
        filters:        
          - name: tag:Env
            values:
              - "infra"
              - "prod"
              - "dev"        
              - "staging"        

    relabel_configs:
        
      - source_labels: [__meta_ec2_tag_Name]
        target_label: instance

      - source_labels: [__meta_ec2_tag_Role]
        target_label: role
      
      - source_labels: [__meta_ec2_tag_Environment]
        target_label: environment        


##################################################
# cAdvisor
##################################################
  - job_name: "cadvisor"

    ec2_sd_configs:
      - region: ap-northeast-2
        port: 8080
        filters:
          - name: tag:Env
            values:
              - "infra"
              - "prod"
              - "dev"
              - "staging"

    relabel_configs:
      - source_labels: [__meta_ec2_tag_Name]
        target_label: instance

      - source_labels: [__meta_ec2_tag_Role]
        target_label: role

      - source_labels: [__meta_ec2_tag_Environment]
        target_label: environment