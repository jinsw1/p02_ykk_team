---
- name: 1. WAS 서버에 애플리케이션 디렉터리 생성
  ansible.builtin.file:
    path: /opt/fastapi-app
    state: directory
    mode: '0755'

- name: 2. 소스 코드 및 도커 빌드 파일 전송
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: /opt/fastapi-app/
  loop:
    - main.py
    - requirements.txt
    - Dockerfile

- name: 3. FastAPI Docker 이미지 로컬 빌드
  community.docker.docker_image:
    name: "{{ was_image }}"
    build:
      path: /opt/fastapi-app
    source: build
    state: present

- name: 4. 애플리케이션 컨테이너 구동
  community.docker.docker_container:
    name: "{{ was_container_name }}"
    image: "{{ was_image }}"
    state: started
    restart_policy: unless-stopped
    ports:
      # 팩트 수집 실패 시 0.0.0.0으로 폴백되도록 안전망 추가
      - "{{ ansible_default_ipv4.address | default('0.0.0.0') }}:{{ was_port }}:8000"
    env:
      DATABASE_URL: "postgresql://{{ db_user }}:{{ db_password }}@{{ db_host }}:{{ db_port }}/{{ db_name }}"
    comparisons:
      env: strict