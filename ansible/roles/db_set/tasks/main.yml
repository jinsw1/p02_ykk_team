---
- name: Ensure db directory exists
  file:
    path: /home/ykk-admin/db
    state: directory
    owner: ykk-admin
    group: ykk-admin

- name: Check git repo exists
  stat:
    path: /home/ykk-admin/db/.git
  register: git_repo

- name: Clone repo (first time only)
  become_user: ykk-admin
  # shell: |
  #   git clone --no-checkout https://github.com/jinsw1/ykk_team_dev.git /home/ykk-admin/db
  shell: |
    git clone -b chore/project-cleanup --no-checkout https://github.com/jinsw1/p02_ykk_team.git /home/ykk-admin/db  
  args:
    creates: /home/ykk-admin/db/.git

- name: Enable sparse checkout
  become_user: ykk-admin
  shell: |
    cd /home/ykk-admin/db
    git sparse-checkout init --cone
    git sparse-checkout set docker/db_server


- name: Fetch latest changes
  become_user: ykk-admin
  shell: |
    cd /home/ykk-admin/db
    git fetch origin main

- name: Reset to latest commit
  become_user: ykk-admin
  shell: |
    cd /home/ykk-admin/db
    git checkout main
    git reset --hard origin/main

- name: Run docker compose
  become_user: ykk-admin
  shell: |
    cd /home/ykk-admin/db/docker/db_server
    docker compose up -d --build



