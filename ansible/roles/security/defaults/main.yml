# ==========================================
# YKK Team Security Baseline Draft
# Ubuntu 기준

# 실습 및 프로젝트 검토용 보안 설정 초안
# 현재는 기본적인 보안 항목만 우선 적용
# ==========================================

# ==============================
# Password Policy
# ==============================

# 비밀번호 최대 사용 기간 설정
# 90일 이후 비밀번호 변경 권장
- name: Set password max age
  command: chage --maxdays 90 root

# 비밀번호 최소 유지 기간 설정
# 비밀번호 반복 변경 방지 목적
- name: Set password min age
  command: chage --mindays 7 root

# 비밀번호 만료 전 경고 일수 설정
# 만료 전에 사용자에게 안내 목적
- name: Set password warning age
  command: chage --warndays 7 root

# 로그인 실패 횟수 제한
# faillock.conf 설정만 추가하며, 실제 잠금 동작은 PAM 연동 확인 필요
- name: Configure faillock deny count
  lineinfile:
    path: /etc/security/faillock.conf
    regexp: '^deny'
    line: "deny = 5"
    create: true

# ==============================
# Package Security
# ==============================

# 사용하지 않는 구형 원격 접속 패키지 제거
- name: Remove insecure packages
  apt:
    name:
      - telnetd
      - rsh-server
    state: absent
    purge: true
    update_cache: true

# ==============================
# Audit Log
# ==============================

# auditd 설치
# 보안 및 작업 이력 확인 목적
- name: Install auditd package
  apt:
    name: auditd
    state: present
    update_cache: true

# auditd 서비스 활성화
- name: Enable auditd service
  service:
    name: auditd
    state: started
    enabled: true

# ==============================
# SYSCTL Security
# ==============================

# 메모리 주소 랜덤화 적용
# 메모리 공격 방어 목적
- name: Enable ASLR
  sysctl:
    name: kernel.randomize_va_space
    value: '2'
    state: present
    reload: true

# SYN Flood 공격 방어
- name: Enable TCP SYN Cookies
  sysctl:
    name: net.ipv4.tcp_syncookies
    value: '1'
    state: present
    reload: true

# ICMP Redirect 차단
- name: Disable ICMP Redirect
  sysctl:
    name: net.ipv4.conf.all.accept_redirects
    value: '0'
    state: present
    reload: true

- name: Disable Default ICMP Redirect
  sysctl:
    name: net.ipv4.conf.default.accept_redirects
    value: '0'
    state: present
    reload: true

# Source Route 차단
- name: Disable Source Route
  sysctl:
    name: net.ipv4.conf.all.accept_source_route
    value: '0'
    state: present
    reload: true

- name: Disable Default Source Route
  sysctl:
    name: net.ipv4.conf.default.accept_source_route
    value: '0'
    state: present
    reload: true

# ==============================
# OS Security Update
# ==============================

# 최신 보안 패치 적용
# 실제 운영 적용 전 테스트 필요
- name: Install security updates
  apt:
    upgrade: safe
    update_cache: true

# ==============================
# Secret Management
# ==============================

# 추후 적용 예정
# 로컬 프로젝트 기준 .gitignore 수정 목적
# 실행 위치에 따라 경로 확인 필요

# .env 파일 Git 업로드 방지
- name: Configure gitignore env policy
  lineinfile:
    path: .gitignore
    line: ".env"
    create: true

# pem / key 파일 업로드 방지
- name: Configure gitignore key policy
  lineinfile:
    path: .gitignore
    line: "*.pem"
    create: true

- name: Configure gitignore private key policy
  lineinfile:
    path: .gitignore
    line: "*.key"
    create: true

# ==============================
# Docker Security
# ==============================

# 추후 적용 예정
# 실제 적용 시 Dockerfile 및 Compose 구조 확인 필요
# 기존 daemon.json이 있으면 덮어쓸 수 있어 실제 적용 전 확인 필요

# Docker daemon 설정 파일 생성
- name: Create docker daemon config
  file:
    path: /etc/docker
    state: directory
    mode: '0755'

# Docker 로그 관리 설정
- name: Configure docker log options
  copy:
    dest: /etc/docker/daemon.json
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "3"
        }
      }

# ==============================
# Nginx Security
# ==============================

# 추후 적용 예정
# 실제 서비스 기능 영향 확인 후 적용 필요
# /etc/nginx/nginx.conf에서 conf.d/*.conf include 여부 확인 필요

# Nginx server_tokens off 설정
- name: Disable nginx server tokens
  lineinfile:
    path: /etc/nginx/nginx.conf
    regexp: '^\s*server_tokens'
    line: '    server_tokens off;'
    insertafter: 'http {'
    backup: true

# Nginx autoindex off 설정
- name: Disable nginx autoindex
  lineinfile:
    path: /etc/nginx/nginx.conf
    regexp: '^\s*autoindex'
    line: '    autoindex off;'
    insertafter: 'http {'
    backup: true

# Security Header 설정
- name: Configure nginx security headers
  copy:
    dest: /etc/nginx/conf.d/security_headers.conf
    content: |
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# HTTPS Redirect 설정 예시
- name: Configure nginx https redirect
  blockinfile:
    path: /etc/nginx/sites-available/default
    block: |
      if ($scheme != "https") {
          return 301 https://$host$request_uri;
      }
    backup: true

# 업로드 크기 제한
- name: Configure nginx upload size limit
  copy:
    dest: /etc/nginx/conf.d/upload_limit.conf
    content: |
      client_max_body_size 10M;

# HTTP Method 제한
- name: Configure nginx allowed methods
  copy:
    dest: /etc/nginx/conf.d/allowed_methods.conf
    content: |
      limit_except GET POST OPTIONS {
          deny all;
      }