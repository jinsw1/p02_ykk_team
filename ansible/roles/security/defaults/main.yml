
# ==========================================
# YKK Team Security Baseline Draft
# Ubuntu 기준

# 실습 및 프로젝트 검토용 보안 설정 초안
# 현재는 기본적인 보안 항목만 우선 적용
# ==========================================

# ==============================
# Password Policy
# ==============================

# 비밀번호 최대 사용 기간 설정
# 90일 이후 비밀번호 변경 권장
- name: Set password max age
  command: chage --maxdays 90 root

# 비밀번호 최소 유지 기간 설정
# 비밀번호 반복 변경 방지 목적
- name: Set password min age
  command: chage --mindays 7 root

# 비밀번호 만료 전 경고 일수 설정
# 만료 전에 사용자에게 안내 목적
- name: Set password warning age
  command: chage --warndays 7 root

# 로그인 실패 횟수 제한
- name: Configure faillock deny count
  lineinfile:
    path: /etc/security/faillock.conf
    regexp: '^deny'
    line: "deny = 5"
    create: true

# ==============================
# Package Security
# ==============================

# 사용하지 않는 구형 원격 접속 패키지 제거
- name: Remove insecure packages
  apt:
    name:
      - telnetd
      - rsh-server
    state: absent
    purge: true
    update_cache: true

# ==============================
# Audit Log
# ==============================

# auditd 설치
# 보안 및 작업 이력 확인 목적
- name: Install auditd package
  apt:
    name: auditd
    state: present
    update_cache: true

# auditd 서비스 활성화
- name: Enable auditd service
  service:
    name: auditd
    state: started
    enabled: true

# ==============================
# SYSCTL Security
# ==============================

# 메모리 주소 랜덤화 적용
# 메모리 공격 방어 목적
- name: Enable ASLR
  sysctl:
    name: kernel.randomize_va_space
    value: '2'
    state: present
    reload: true

# SYN Flood 공격 방어
- name: Enable TCP SYN Cookies
  sysctl:
    name: net.ipv4.tcp_syncookies
    value: '1'
    state: present
    reload: true

# ICMP Redirect 차단
- name: Disable ICMP Redirect
  sysctl:
    name: net.ipv4.conf.all.accept_redirects
    value: '0'
    state: present
    reload: true

- name: Disable Default ICMP Redirect
  sysctl:
    name: net.ipv4.conf.default.accept_redirects
    value: '0'
    state: present
    reload: true

# Source Route 차단
- name: Disable Source Route
  sysctl:
    name: net.ipv4.conf.all.accept_source_route
    value: '0'
    state: present
    reload: true

- name: Disable Default Source Route
  sysctl:
    name: net.ipv4.conf.default.accept_source_route
    value: '0'
    state: present
    reload: true

# ==============================
# OS Security Update
# ==============================

# 최신 보안 패치 적용 예정
# 실제 운영 적용 전 테스트 필요
- name: Security update policy
  debug:
    msg: "Security updates should be reviewed before applying"

# ==============================
# Secret Management
# ==============================

# 추후 적용 예정
# - .env 파일 Git 업로드 제한
# - pem / key / token 파일 업로드 제한
# - GitHub Secret 연동
# - 운영 계정 분리

# .env 파일 관리 정책 안내
- name: Secret management .env policy
  debug:
    msg: ".env files should not be uploaded to Git repositories"

# PEM Key 관리 정책 안내
- name: Secret management pem key policy
  debug:
    msg: "PEM key files should not be uploaded to Git repositories"

# Token 및 Key 관리 정책 안내
- name: Secret management token policy
  debug:
    msg: "Token and key files should be managed separately"

# GitHub Secret 사용 정책 안내
- name: Secret management GitHub Secret policy
  debug:
    msg: "Sensitive credentials should use GitHub Secrets"

# ==============================
# Docker Security
# ==============================

# 추후 적용 예정
# 실제 적용 시 Dockerfile 및 Compose 구조 확인 필요
# - Root Container 제한
# - Privileged 옵션 제한
# - 불필요 포트 최소화
# - Trivy 이미지 점검

# Root Container 제한 정책 안내
- name: Docker root container policy
  debug:
    msg: "Containers should run as non-root users"

# Privileged 옵션 제한 정책 안내
- name: Docker privileged policy
  debug:
    msg: "Containers should avoid privileged option"

# 포트 노출 최소화 정책 안내
- name: Docker exposed ports policy
  debug:
    msg: "Expose only required ports"

# 이미지 점검 정책 안내
- name: Docker image scan policy
  debug:
    msg: "Container images should be scanned using Trivy"

# ==============================
# Nginx Security
# ==============================

# 추후 적용 예정
# 실제 서비스 기능 영향 확인 후 적용 필요
# - server_tokens off
# - autoindex off
# - HTTPS Redirect
# - Security Header 적용
# - 업로드 크기 제한
# - Method 제한

# 서버 버전 숨김 정책 안내
- name: Nginx server version policy
  debug:
    msg: "Nginx server version exposure should be minimized"

# 디렉토리 리스팅 차단 정책 안내
- name: Nginx autoindex policy
  debug:
    msg: "Directory listing should be disabled"

# HTTPS Redirect 정책 안내
- name: Nginx HTTPS redirect policy
  debug:
    msg: "HTTP traffic should be redirected to HTTPS"

# Security Header 정책 안내
- name: Nginx security header policy
  debug:
    msg: "Security headers should be configured"

# 업로드 크기 제한 정책 안내
- name: Nginx upload size policy
  debug:
    msg: "Client upload size should be limited"

# HTTP Method 제한 정책 안내
- name: Nginx allowed method policy
  debug:
    msg: "Only required HTTP methods should be allowed"
