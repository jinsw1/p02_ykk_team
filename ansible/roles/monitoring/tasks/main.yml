---
- name: 1. node_exporter 전용 시스템 계정 생성
  ansible.builtin.user:
    name: node_exporter
    system: yes
    shell: /usr/sbin/nologin
    create_home: no

- name: 2-0. 현재 설치된 node_exporter 버전 확인
  ansible.builtin.command:
    cmd: "{{ node_exporter_bin_path }} --version"
  register: installed_version
  failed_when: false
  changed_when: false

- name: 2-0b. 설치 필요 여부 및 경로 변수 동적 설정 (타입 안정성 확보)
  ansible.builtin.set_fact:
    # 전체 and 조건식을 괄호로 묶어 | bool 필터가 완벽하게 적용되도록 수정
    _node_exporter_needs_install: "{{ ((node_exporter_version not in (installed_version.stdout | default(''))) and (node_exporter_version not in (installed_version.stderr | default('')))) | bool }}"
    _node_exporter_arch: "{{ node_exporter_arch_map[ansible_architecture] | default('amd64') }}"

- name: 2-1. node_exporter 다운로드 (동적 체크섬 및 재시도 적용)
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-{{ _node_exporter_arch }}.tar.gz"
    dest: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
    checksum: "sha256:{{ node_exporter_checksums[_node_exporter_arch] }}"
    timeout: 30
    mode: '0644'
  register: download_result
  until: download_result is success
  retries: 3
  delay: 5
  when: _node_exporter_needs_install

- name: 2-2. 다운로드한 압축 파일 해제
  ansible.builtin.unarchive:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
    dest: /tmp/
    remote_src: yes
    creates: "/tmp/node_exporter-{{ node_exporter_version }}.linux-{{ _node_exporter_arch }}/node_exporter"
  when: _node_exporter_needs_install

- name: 3. 실행 바이너리 파일 이동 및 권한 부여
  ansible.builtin.copy:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-{{ _node_exporter_arch }}/node_exporter"
    dest: "{{ node_exporter_bin_path }}"
    remote_src: yes
    owner: node_exporter
    group: node_exporter
    mode: '0755'
  when: _node_exporter_needs_install

- name: 4. systemd 서비스 등록 템플릿 복사
  ansible.builtin.template:
    src: node_exporter.service.j2
    dest: /etc/systemd/system/node_exporter.service
    owner: root
    group: root
    mode: '0644'
  notify: restart node_exporter

- name: 5. 설치 완료 후 잔여 임시 파일 정리
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "/tmp/node_exporter-{{ node_exporter_version }}.linux-{{ _node_exporter_arch }}"
    - "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
  when: _node_exporter_needs_install

- name: 6. 서비스 데몬 리로드 및 node_exporter 가동
  ansible.builtin.systemd:
    name: node_exporter
    state: started
    enabled: yes
    daemon_reload: yes