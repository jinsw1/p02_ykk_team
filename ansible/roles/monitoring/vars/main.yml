---
node_exporter_version: "1.8.2"

# 아키텍처별 무결성 검증 체크섬 분리
# 주의: arm64 인프라 도입 시 반드시 공식 릴리스 페이지의 실제 sha256 값으로 교체해야 합니다.
node_exporter_checksums:
  amd64: "6809dd0b3ec45fd6e992c19071d6b5253aed3ead7bf0686885a51d85c6643c66"
  arm64: "REPLACE_ME_WITH_REAL_ARM64_CHECKSUM"

node_exporter_bin_path: "/usr/local/bin/node_exporter"

# 팩트 수집 실패 시 예외 처리 (기본값 0.0.0.0으로 fallback)
node_exporter_listen_address: "{{ ansible_default_ipv4.address | default('0.0.0.0') }}:9100"

node_exporter_arch_map:
  x86_64: amd64
  aarch64: arm64